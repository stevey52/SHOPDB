<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopMaster Mobile-Ready</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Mobile Sidebar Transitions */
        #sidebar {
            transition: transform 0.3s ease-in-out;
        }
        @media (max-width: 768px) {
            #sidebar { transform: translateX(-100%); }
            #sidebar.open { transform: translateX(0); }
        }
        
        /* Custom scrollbar for tables */
        .table-container::-webkit-scrollbar { height: 6px; }
        .table-container::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50">

    <!-- OVERLAY (Mobile only) -->
    <div id="overlay" onclick="toggleMenu()" class="fixed inset-0 bg-black/50 z-40 hidden opacity-0 transition-opacity"></div>

    <!-- SIDEBAR -->
    <aside id="sidebar" class="fixed left-0 top-0 h-screen w-64 bg-slate-900 text-white flex flex-col z-50 md:translate-x-0">
        <div class="p-6 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-lg"><i data-lucide="store" class="w-6 h-6 text-white"></i></div>
                <span class="text-xl font-bold">ShopMaster</span>
            </div>
            <!-- Close button for mobile -->
            <button onclick="toggleMenu()" class="md:hidden text-slate-400">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
        </div>

        <nav class="flex-1 px-4 space-y-1 mt-4">
            <button onclick="switchTab('dashboard')" class="w-full flex items-center gap-3 p-3 rounded-xl bg-indigo-600 text-white">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
            </button>
            <button onclick="switchTab('products')" class="w-full text-slate-400 hover:text-white flex items-center gap-3 p-3 rounded-xl transition">
                <i data-lucide="package" class="w-5 h-5"></i> Products
            </button>
            <button class="w-full text-slate-400 hover:text-white flex items-center gap-3 p-3 rounded-xl transition">
                <i data-lucide="shopping-cart" class="w-5 h-5"></i> Sales
            </button>
            <button class="w-full text-slate-400 hover:text-white flex items-center gap-3 p-3 rounded-xl transition text-left">
                <i data-lucide="users" class="w-5 h-5"></i> Customers
            </button>
        </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="md:ml-64 flex-1 min-h-screen">
        
        <!-- TOP NAVBAR -->
        <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-4 md:px-8 sticky top-0 z-40">
            <div class="flex items-center gap-4">
                <!-- Hamburger Menu Button -->
                <button onclick="toggleMenu()" class="md:hidden p-2 bg-slate-100 rounded-lg">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
                <h1 class="text-lg font-semibold text-slate-800 hidden sm:block">Overview</h1>
            </div>

            <div class="flex items-center gap-3 md:gap-6">
                <!-- Search Collapsed on Mobile -->
                <div class="relative hidden lg:block">
                    <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" placeholder="Search..." class="bg-slate-100 border-none rounded-full pl-10 pr-4 py-2 text-sm w-48 xl:w-64">
                </div>
                
                <button class="text-slate-500"><i data-lucide="bell" class="w-5 h-5"></i></button>
                
                <div class="flex items-center gap-2 pl-2 border-l">
                    <img src="https://ui-avatars.com/api/?name=Admin" class="w-8 h-8 rounded-full">
                    <span class="text-xs font-medium hidden md:block">Administrator</span>
                </div>
            </div>
        </header>

        <div class="p-4 md:p-8">
            <!-- STATS CARDS (Grid stacks on mobile) -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6 mb-8">
                <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                    <div class="flex justify-between items-start">
                        <p class="text-slate-500 text-xs font-semibold uppercase tracking-wider">Revenue</p>
                        <span class="text-green-500 text-xs font-bold">+12%</span>
                    </div>
                    <h3 class="text-xl font-bold text-slate-800 mt-2">$4,250.00</h3>
                </div>
                <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                    <p class="text-slate-500 text-xs font-semibold uppercase tracking-wider">Today's Sales</p>
                    <h3 class="text-xl font-bold text-slate-800 mt-2">128</h3>
                </div>
                <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                    <p class="text-slate-500 text-xs font-semibold uppercase tracking-wider">Low Stock</p>
                    <h3 class="text-xl font-bold text-red-600 mt-2">14</h3>
                </div>
                <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                    <p class="text-slate-500 text-xs font-semibold uppercase tracking-wider">New Customers</p>
                    <h3 class="text-xl font-bold text-slate-800 mt-2">48</h3>
                </div>
            </div>

            <!-- CHARTS (Stacks on mobile) -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
                <div class="lg:col-span-2 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                    <h3 class="font-bold text-slate-800 mb-4 text-sm">Weekly Sales Trend</h3>
                    <canvas id="salesChart" height="150"></canvas>
                </div>
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                    <h3 class="font-bold text-slate-800 mb-4 text-sm">Top Categories</h3>
                    <canvas id="catChart" height="200"></canvas>
                </div>
            </div>

            <!-- RECENT SALES TABLE (Horizontal scroll on mobile) -->
            <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                <div class="p-5 border-b border-slate-100">
                    <h3 class="font-bold text-slate-800 text-sm">Recent Transactions</h3>
                </div>
                <div class="table-container overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-slate-50 text-slate-500 text-[10px] uppercase font-bold tracking-widest">
                            <tr>
                                <th class="px-6 py-3 whitespace-nowrap">Order ID</th>
                                <th class="px-6 py-3 whitespace-nowrap">Customer</th>
                                <th class="px-6 py-3 whitespace-nowrap">Amount</th>
                                <th class="px-6 py-3 whitespace-nowrap">Status</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100">
                            <tr class="text-sm hover:bg-slate-50">
                                <td class="px-6 py-4 font-medium whitespace-nowrap">#INV-9901</td>
                                <td class="px-6 py-4 whitespace-nowrap">Dianne Russell</td>
                                <td class="px-6 py-4 whitespace-nowrap">$450.00</td>
                                <td class="px-6 py-4 whitespace-nowrap"><span class="bg-green-100 text-green-700 px-2.5 py-1 rounded-full text-[10px] font-bold">SUCCESS</span></td>
                            </tr>
                            <tr class="text-sm hover:bg-slate-50">
                                <td class="px-6 py-4 font-medium whitespace-nowrap">#INV-9902</td>
                                <td class="px-6 py-4 whitespace-nowrap">Guy Hawkins</td>
                                <td class="px-6 py-4 whitespace-nowrap">$120.50</td>
                                <td class="px-6 py-4 whitespace-nowrap"><span class="bg-yellow-100 text-yellow-700 px-2.5 py-1 rounded-full text-[10px] font-bold">PENDING</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        // Toggle Sidebar Function
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            
            sidebar.classList.toggle('open');
            if (sidebar.classList.contains('open')) {
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.classList.add('opacity-100'), 10);
            } else {
                overlay.classList.remove('opacity-100');
                setTimeout(() => overlay.classList.add('hidden'), 300);
            }
        }

        // Charts
        const sCtx = document.getElementById('salesChart').getContext('2d');
        new Chart(sCtx, {
            type: 'line',
            data: {
                labels: ['M', 'T', 'W', 'T', 'F', 'S', 'S'],
                datasets: [{ 
                    data: [30, 45, 35, 60, 50, 80, 95], 
                    borderColor: '#4f46e5', 
                    tension: 0.4,
                    pointRadius: 0
                }]
            },
            options: { 
                plugins: { legend: { display: false } },
                scales: { x: { grid: { display: false } }, y: { display: false } }
            }
        });

        const cCtx = document.getElementById('catChart').getContext('2d');
        new Chart(cCtx, {
            type: 'doughnut',
            data: {
                labels: ['Electronics', 'Food'],
                datasets: [{ data: [70, 30], backgroundColor: ['#4f46e5', '#e2e8f0'] }]
            },
            options: { cutout: '80%', plugins: { legend: { display: false } } }
        });
    </script>
</body>
</html>
